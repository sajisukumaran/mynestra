# MyNestra — PRODUCTION stack (deployed by Jenkins, fronted by the external dockerlab-edge nginx).
# Two services only; no nginx/tailwind/mailpit here (edge provides nginx; prod email = the shared
# `mailpit:1025` on edge_network). No host ports — the edge reaches everything by container name.
# Auto-loads `.env` from the deploy dir for ${..} interpolation and injects it into web (env_file).
name: mynestra

services:
  db:
    image: postgres:17
    container_name: mynestra-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mynestra}
      POSTGRES_USER: ${POSTGRES_USER:-mynestra}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in the deploy .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mynestra} -d ${POSTGRES_DB:-mynestra}"]
      interval: 5s
      timeout: 5s
      retries: 12
    # Joins edge_network so pgAdmin + nightly pg_dump on the edge reach it as `mynestra-db`.
    networks: [mynestra, edge_network]

  web:
    build:
      context: .
      dockerfile: docker/web.prod.Dockerfile
    # Distinct tag so a prod build never clobbers the dev image (same project/service name).
    image: mynestra-web:prod
    container_name: mynestra-web
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Runtime-mutable uploads (tenant logos, photos); static is baked into the image.
      - media_files:/app/media
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    # `mynestra` reaches db; `edge_network` = the edge proxies to `mynestra-web:8000` + reach `mailpit`.
    networks: [mynestra, edge_network]
    # Daily EOD price fetch — the `cron` sidecar reads these labels and exec-s the command inside
    # this running container (so it inherits prod env). 6-field cron (secs first); 23:10 UTC Mon–Fri
    # is after the US close year-round. Adjust the hour for your market/timezone.
    labels:
      ofelia.enabled: "true"
      ofelia.job-exec.eod-prices.schedule: "0 10 23 * * 1-5"
      ofelia.job-exec.eod-prices.command: "python manage.py fetch_eod_prices"
    # ENTRYPOINT waits for db -> migrate_schemas --shared -> ensure_public_tenant, then runs gunicorn (CMD).

  # Cron sidecar: fires scheduled jobs by exec-ing into labelled containers (here, the web container
  # above). Pinned Ofelia; needs the Docker socket read-only to exec. No app code runs here.
  cron:
    image: mcuadros/ofelia:v0.3.16
    container_name: mynestra-cron
    restart: unless-stopped
    depends_on: [web]
    command: daemon --docker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks: [mynestra]

volumes:
  pgdata:
  media_files:
    # Explicit name so the edge's media backup (`docker volume inspect mynestra_media_files`) finds it.
    name: mynestra_media_files

networks:
  mynestra:
    driver: bridge
  edge_network:
    external: true
