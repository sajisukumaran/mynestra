name: mynestra

services:
  db:
    image: postgres:17
    container_name: mynestra-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mynestra}
      POSTGRES_USER: ${POSTGRES_USER:-mynestra}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mynestra}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mynestra} -d ${POSTGRES_DB:-mynestra}"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks: [mynestra]

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    container_name: mynestra-web
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      # manage.py defaults to config.settings.dev; DB/email point at the compose services.
      SECRET_KEY: ${SECRET_KEY:-dev-insecure-change-me}
      DJANGO_DEBUG: "true"
      ENVIRONMENT: ${ENVIRONMENT:-dev}
      ALLOW_HARD_DELETE: ${ALLOW_HARD_DELETE:-1}
      POSTGRES_DB: ${POSTGRES_DB:-mynestra}
      POSTGRES_USER: ${POSTGRES_USER:-mynestra}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mynestra}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      EMAIL_HOST: mailpit
      EMAIL_PORT: "1025"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
    networks: [mynestra]
    # ENTRYPOINT waits for db -> migrate_schemas --shared -> ensure_public_tenant, then runs CMD.
    command: ["python", "manage.py", "runserver", "0.0.0.0:8000"]

  tailwind:
    build:
      context: .
      dockerfile: docker/tailwind.Dockerfile
    container_name: mynestra-tailwind
    restart: unless-stopped
    volumes:
      - .:/app
    networks: [mynestra]

  nginx:
    image: nginx:1.27-alpine
    container_name: mynestra-nginx
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./static:/srv/static:ro
    depends_on:
      - web
    networks: [mynestra]

  mailpit:
    image: axllent/mailpit:latest
    container_name: mynestra-mailpit
    restart: unless-stopped
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: "true"
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"
    ports:
      # Web UI only. SMTP (1025) is internal — web reaches it by container name, no host publish.
      # 8025 is the conventional Mailpit port; override MAILPIT_PORT if another stack already uses it.
      - "${MAILPIT_PORT:-8025}:8025"
    networks: [mynestra]

volumes:
  pgdata:

networks:
  mynestra:
    driver: bridge
