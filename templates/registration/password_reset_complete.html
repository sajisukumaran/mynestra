{% extends "base.html" %}
{% block title %}Password changed · MyNestra{% endblock %}
{% block content %}
<main class="mx-auto flex min-h-screen max-w-sm flex-col justify-center gap-6 px-6">
  <div class="rounded-2xl border border-slate-200 bg-white p-8 text-center shadow-sm">
    <h1 class="text-lg font-semibold text-slate-900">Password changed</h1>
    <p class="mt-2 text-sm text-slate-500">Your password has been updated.</p>
    <a class="mt-6 inline-block rounded-lg bg-slate-900 px-4 py-2 text-sm font-medium text-white hover:bg-slate-800" href="{% url 'login' %}">Sign in</a>
  </div>
</main>
{% endblock %}
