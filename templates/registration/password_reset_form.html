{% extends "base.html" %}
{% block title %}Reset password · MyNestra{% endblock %}
{% block content %}
<main class="mx-auto flex min-h-screen max-w-sm flex-col justify-center gap-6 px-6">
  <div class="rounded-2xl border border-slate-200 bg-white p-8 shadow-sm">
    <h1 class="text-lg font-semibold text-slate-900">Reset your password</h1>
    <p class="mt-2 text-sm text-slate-500">Enter your email and we'll send a reset link.</p>
    <form method="post" class="mt-6 space-y-4">
      {% csrf_token %}
      <div>
        <label class="mb-1 block text-sm font-medium text-slate-700" for="{{ form.email.id_for_label }}">Email</label>
        {{ form.email }}
      </div>
      <button type="submit" class="w-full rounded-lg bg-slate-900 px-4 py-2 text-sm font-medium text-white hover:bg-slate-800">Send reset link</button>
    </form>
    <p class="mt-4 text-sm text-slate-500"><a class="text-slate-700 underline" href="{% url 'login' %}">Back to sign in</a></p>
  </div>
</main>
{% endblock %}
