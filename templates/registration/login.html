{% extends "base.html" %}
{% block title %}Sign in · MyNestra{% endblock %}
{% block content %}
<main class="auth-wrap">
  <c-card class="auth-card">
    <div class="stack-16">
      <div class="row" style="gap:9px;"><span class="brand-mark">M</span><span class="brand-name">My<b>Nestra</b></span></div>
      <h1 style="font-size:var(--fs-xl);">Sign in</h1>
      {% if form.errors %}
        <div class="err-msg"><c-icon name="triangle-alert" size="sm" /> That email and password didn't match.</div>
      {% endif %}
      <form method="post" class="stack-16">
        {% csrf_token %}
        <c-field label="Email"><div class="control">{{ form.username }}</div></c-field>
        <c-field label="Password"><div class="control">{{ form.password }}</div></c-field>
        <input type="hidden" name="next" value="{{ next }}">
        <c-button type="submit" variant="primary" style="width:100%;">Sign in</c-button>
      </form>
      <a class="subtle" style="font-size:var(--fs-sm);" href="{% url 'password_reset' %}">Forgot your password?</a>
    </div>
  </c-card>
</main>
{% endblock %}
