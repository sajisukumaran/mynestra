{% comment %}Premium modal fields, shared by the add + edit forms. Expects the enclosing <form> to
provide an Alpine scope: { funding }. `premium` (optional) prefills for edit.{% endcomment %}
<div class="stack-16">
  <div class="form-grid">
    <c-field label="Date" required><div class="control"><input type="date" name="date" value="{% if premium %}{{ premium.date|date:'Y-m-d' }}{% else %}{% now 'Y-m-d' %}{% endif %}"></div></c-field>
    <c-field label="Amount" required><div class="control"><input name="amount" inputmode="decimal" placeholder="0.00" value="{% if premium %}{{ premium.amount|floatformat:'-2' }}{% endif %}"></div></c-field>
  </div>
  <div class="form-grid">
    <c-field label="Covers from"><div class="control"><input type="date" name="covers_from" value="{% if premium %}{{ premium.covers_from|date:'Y-m-d' }}{% endif %}"></div></c-field>
    <c-field label="Covers through" help="Advances the renewal date."><div class="control"><input type="date" name="covers_through" value="{% if premium %}{{ premium.covers_through|date:'Y-m-d' }}{% endif %}"></div></c-field>
    <c-field label="Due date" help="Optional — for an unpaid bill."><div class="control"><input type="date" name="due_date" value="{% if premium %}{{ premium.due_date|date:'Y-m-d' }}{% endif %}"></div></c-field>
  </div>

  <c-field label="How was it paid?">
    <div class="control is-select">
      <select name="funding_source" x-model="funding">
        {% for val, label in fundings %}<option value="{{ val }}"{% if premium and premium.funding_source == val %} selected{% elif not premium and val == 'none' %} selected{% endif %}>{{ label }}</option>{% endfor %}
      </select>
      <c-icon name="chevron-down" size="sm" class="subtle" />
    </div>
  </c-field>
  <div class="form-grid">
    <c-field label="Bank account" x-show="funding === 'bank'" x-cloak>
      <div class="control is-select">
        <select name="funding_account">
          <option value="">—</option>
          {% for a in bank_accounts %}<option value="{{ a.pk }}"{% if premium and premium.funding_account_id == a.pk %} selected{% endif %}>{{ a.nickname }}</option>{% endfor %}
        </select>
        <c-icon name="chevron-down" size="sm" class="subtle" />
      </div>
    </c-field>
    <c-field label="Credit card" x-show="funding === 'card'" x-cloak>
      <div class="control is-select">
        <select name="credit_card">
          <option value="">—</option>
          {% for c in credit_cards %}<option value="{{ c.pk }}"{% if premium and premium.credit_card_id == c.pk %} selected{% endif %}>{{ c.nickname }}</option>{% endfor %}
        </select>
        <c-icon name="chevron-down" size="sm" class="subtle" />
      </div>
    </c-field>
    <c-field label="Cash account" x-show="funding === 'cash'" x-cloak>
      <div class="control is-select">
        <select name="cash_account">
          <option value="">Cash on hand</option>
          {% for a in cash_accounts %}<option value="{{ a.pk }}"{% if premium and premium.cash_account_id == a.pk %} selected{% endif %}>{{ a.code }} — {{ a.name }}</option>{% endfor %}
        </select>
        <c-icon name="chevron-down" size="sm" class="subtle" />
      </div>
    </c-field>
  </div>

  <c-field label="Reference"><c-input name="reference" value="{% if premium %}{{ premium.reference }}{% endif %}" placeholder="Policy / invoice number" /></c-field>
  <c-field label="Memo"><c-input name="memo" value="{% if premium %}{{ premium.memo }}{% endif %}" placeholder="Optional note" /></c-field>
</div>
