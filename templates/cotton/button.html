<c-vars variant="default" size="" type="button" icon_only="" href="" class="" />
{% comment %}Renders a <button>, or an <a> styled as a button when `href` is given (for navigation
actions on feature pages, so they still compose the component rather than raw .btn classes).{% endcomment %}
{% if href %}
<a href="{{ href }}" class="btn{% if variant != 'default' %} btn-{{ variant }}{% endif %}{% if size %} btn-{{ size }}{% endif %}{% if icon_only %} btn-icon{% endif %}{% if class %} {{ class }}{% endif %}" {{ attrs }}>{{ slot }}</a>
{% else %}
<button type="{{ type }}" class="btn{% if variant != 'default' %} btn-{{ variant }}{% endif %}{% if size %} btn-{{ size }}{% endif %}{% if icon_only %} btn-icon{% endif %}{% if class %} {{ class }}{% endif %}" {{ attrs }}>{{ slot }}</button>
{% endif %}
