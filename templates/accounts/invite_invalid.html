{% extends "base.html" %}
{% block title %}Invitation unavailable · MyNestra{% endblock %}
{% block content %}
<main class="mx-auto flex min-h-screen max-w-sm flex-col justify-center gap-6 px-6">
  <div class="rounded-2xl border border-slate-200 bg-white p-8 text-center shadow-sm">
    <h1 class="text-lg font-semibold text-slate-900">Invitation unavailable</h1>
    <p class="mt-2 text-sm text-slate-500">This invitation has expired or has already been used.</p>
    <a class="mt-6 inline-block text-sm text-slate-700 underline" href="{% url 'login' %}">Go to sign in</a>
  </div>
</main>
{% endblock %}
