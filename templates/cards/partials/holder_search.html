{% comment %}htmx fragment: people for the "add someone else" cardholder search.{% endcomment %}
{% for p in candidates %}
<button type="button" class="rel-pick" data-id="{{ p.pk }}" data-name="{{ p.display_name }}"
        data-tint="{{ p.avatar_tint }}" data-initials="{{ p.initials }}" @click="addExtra($el.dataset)">
  <c-avatar tint="{{ p.avatar_tint }}" size="sm">{{ p.initials }}</c-avatar>
  <div class="grow"><div class="r-name">{{ p.display_name }}</div>{% if p.list_subtitle %}<div class="r-role">{{ p.list_subtitle }}</div>{% endif %}</div>
</button>
{% empty %}
<div class="rel-empty">{% if q %}No matches for “{{ q }}”.{% else %}Type to search people.{% endif %}</div>
{% endfor %}
