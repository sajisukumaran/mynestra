{% extends "setup/base.html" %}
{% block setup_heading %}Overview{% endblock %}

{% block setup %}
<c-breadcrumb><a href="{{ ui_tenant_url }}">Home</a><c-icon name="chevron-right" /><span class="strong">Setup</span></c-breadcrumb>
<c-page-header title="Setup" subtitle="Manage your household's catalogs, members and appearance." />

<div class="tiles">
  <c-app-tile name="Categories" description="Person & organization labels" glyph="tag" tint="contacts" href="{{ ui_tenant_url }}setup/categories/">
    <c-tile-stat n="{{ nav_categories }}" label="Categories" />
  </c-app-tile>

  <c-app-tile name="Relationship types" description="How people & orgs relate" glyph="network" tint="contacts" href="{{ ui_tenant_url }}setup/relationship-types/">
    <c-tile-stat n="{{ nav_rel_types }}" label="Types" />
  </c-app-tile>

  <c-app-tile name="Members" description="People with access to this household" glyph="users" tint="contacts" href="{{ ui_tenant_url }}setup/members/">
    <c-tile-stat n="{{ nav_members }}" label="Members" />
    <c-tile-stat n="{{ nav_invites }}" label="Pending" />
  </c-app-tile>

  <c-app-tile name="Appearance" description="Household palette & your theme" glyph="palette" tint="contacts" href="{{ ui_tenant_url }}setup/appearance/" />

  <c-app-tile name="Household profile" description="Name & logo" glyph="building-2" tint="contacts" href="{{ ui_tenant_url }}setup/profile/" />

  <c-app-tile name="Recently deleted" description="Restore removed records" glyph="trash-2" tint="contacts" href="{{ ui_tenant_url }}setup/recently-deleted/" />
</div>
{% endblock %}
