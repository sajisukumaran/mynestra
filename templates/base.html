{% load static %}
<!doctype html>
<html lang="en" data-theme="light" data-palette="teal">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}MyNestra{% endblock %}</title>
  {# Pre-paint: apply saved theme/palette before first paint (no flash). Always sets an explicit
     data-theme so palette dark selectors resolve. #}
  <script>
    (function () {
      var r = document.documentElement;
      try {
        var t = localStorage.getItem("mynestra-theme");
        r.setAttribute("data-theme", t || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light"));
        r.setAttribute("data-palette", localStorage.getItem("mynestra-palette") || "teal");
      } catch (e) {
        r.setAttribute("data-theme", "light");
        r.setAttribute("data-palette", "teal");
      }
    })();
  </script>
  <link rel="stylesheet" href="{% static 'css/tailwind.build.css' %}">
  <script defer src="{% static 'js/ui.js' %}"></script>
  <script defer src="{% static 'vendor/alpine.min.js' %}"></script>
  <script defer src="{% static 'vendor/htmx.min.js' %}"></script>
</head>
<body>
  {% include "_icon_sprite.html" %}
  {% block content %}{% endblock %}
</body>
</html>
