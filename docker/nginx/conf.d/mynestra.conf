# MyNestra dev vhost. Single entry point for the stack; proxies to the `mynestra-web` container
# and serves /static/ directly from the shared ./static mount. Follows the dockerlab-edge house
# style (container-name upstream via resolver, X-Forwarded-* headers) so edge integration is a
# drop-in later. Routing is path-based (/t/<slug>/), so server_name is just localhost.
server {
    listen 80;
    server_name localhost;

    client_max_body_size 25m;

    location /static/ {
        alias /srv/static/;
        access_log off;
        expires 1h;
    }

    location / {
        # Variable upstream -> lazy resolution via the resolver in nginx.conf (nginx starts even if
        # web is momentarily down). No URI on $target, so the original request URI is passed as-is.
        set $target http://mynestra-web:8000;
        proxy_pass $target;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_read_timeout 120s;
    }
}
